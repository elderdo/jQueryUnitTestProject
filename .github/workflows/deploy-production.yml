# Workflow shown in the GitHub Actions tab.
name: Deploy Production

# Run deployment flow for pushes to main.
on:
  push:
    branches: [main]
  # Optional manual trigger for controlled reruns.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # First, re-validate main with tests in this workflow.
  test:
    name: Run Jest Tests (Main)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test -- --watchAll=false

  # Deploy starts only if test job succeeds.
  deploy:
    name: Production Deploy Gate
    runs-on: ubuntu-latest
    needs: test
    # Use GitHub Environments for optional approvals/secrets/protection rules.
    environment: production

    steps:
      # Replace this placeholder with your actual deployment commands.
      - name: Deploy placeholder
        run: |
          echo "Tests passed on main."
          echo "Add your production deploy command(s) here."
