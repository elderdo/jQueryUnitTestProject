# Workflow shown in the GitHub Actions tab.
name: PR Checks

# Run this workflow for pull requests into main.
on:
  pull_request:
    branches: [main]
  # Optional manual trigger from GitHub UI.
  workflow_dispatch:

# Principle of least privilege.
permissions:
  contents: read

jobs:
  # This job is the quality gate for pull requests.
  test:
    name: Run Jest Tests (PR)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Keep one version for simplicity; add more if you need compatibility testing.
        node-version: [20.x]

    steps:
      # Download your repository content to the runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Node.js for the current matrix version.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # Reuse npm cache to speed up subsequent runs.
          cache: npm

      # Install exact dependency versions from package-lock.json.
      - name: Install dependencies
        run: npm ci

      # Run tests once and exit (no watch mode in CI).
      - name: Run Jest tests
        run: npm test -- --watchAll=false
